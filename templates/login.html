{% extends "base.html" %}

{% block content %}
<section class="section bg-light login-section">
    <div class="container">
        <div class="login-wrapper card-shadow">
            <div class="text-center mb-4">
                <h2>Admin Login</h2>
                <p class="text-muted">Secure access for clinic staff</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/admin" method="POST" class="form">
                <div class="form-group">
                    <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-3">Login</button>
            </form>
            <div class="text-center mt-3">
                <a href="/" class="text-muted"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
